<!DOCTYPE html>
<html>
<head>
    <title>Rastreador Atja̱ꞌyaa̱ꞌla</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style> #map { height: 100vh; width: 100%; } </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20.67, -103.34], 13); // Guadalajara inicial
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([0, 0]).addTo(map);

        async function actualizarMapa() {
            const res = await fetch('/api');
            const data = await res.json();
            if (data.lat) {
                const pos = [data.lat, data.lon];
                marker.setLatLng(pos);
                map.panTo(pos);
                marker.bindPopup("Atja̱ꞌyaa̱ꞌla está aquí<br>Hora: " + data.timestamp).openPopup();
            }
        }
        setInterval(actualizarMapa, 10000); // Se actualiza cada 10 segundos
    </script>
</body>
</html>
